<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIS - Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff0080;
            --bg-dark: #000210;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* 延續遊戲的掃描線效果 */
        .scanline {
            width: 100%; height: 100%;
            position: fixed; top: 0; left: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 20;
        }

        /* 上方 Logo 區域 */
        .header-section {
            padding: 40px 0;
            z-index: 10;
        }

        .main-logo {
            width: 180px;
            filter: drop-shadow(0 0 15px var(--neon-blue));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--neon-blue)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 30px var(--neon-blue)); }
        }

        /* 下方內容區域：左右分欄 */
        .main-content {
            display: flex;
            width: 90%;
            max-width: 1200px;
            flex: 1;
            gap: 40px;
            margin-bottom: 50px;
            z-index: 10;
        }

        /* 左側：公告 News */
        .news-side {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border-left: 5px solid var(--neon-pink);
            transform: skewX(-4deg);
            padding: 30px;
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        .news-side > * { transform: skewX(4deg); } /* 反向傾斜文字 */

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--neon-pink);
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .news-item {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .news-date { color: #888; font-size: 0.8rem; }
        .news-text { margin: 5px 0; color: #ccc; }

        /* 右側：動作按鈕 */
        .action-side {
            width: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .game-title {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            transform: skewX(-10deg);
        }

        .game-title h2 {
            font-size: 3rem;
            margin: 0;
            font-style: italic;
            text-shadow: 3px 3px 0px var(--neon-pink);
        }

        .play-btn {
            width: 100%;
            padding: 25px;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            transform: skewX(-10deg);
        }

        .play-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        .play-btn::after {
            content: "SYSTEM READY";
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 0.6rem;
            opacity: 0.7;
        }

        /* 底部裝飾 */
        .footer-decor {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue));
            z-index: 5;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <header class="header-section">
        <img src="images/join.png" alt="AXIS Logo" class="main-logo">
    </header>

    <main class="main-content">
        <section class="news-side">
            <h2 class="section-title">Latest News</h2>
            <div class="news-content">
                <div class="news-item">
                    <span class="news-date">2026.04.19</span>
                    <p class="news-text">曲目更新！PADORU / PADORU已經完成譜面製作。</p>
                </div>
            </div>
        </section>

        <section class="action-side">
            <div class="game-title">
                <h2>NEON DRIVE</h2>
                <p style="color: var(--neon-blue); letter-spacing: 5px;">VER 1.0.0</p>
            </div>
            
            <a href="index.html" class="play-btn">LAUNCH ENGINE</a>
            
            <p style="color: #555; font-size: 0.8rem; text-align: center;">
                RECOMMENDED: HEADPHONES ON<br>
                IN GAME， PRESS [ENTER] TO START IN GAME
            </p>
        </section>
    </main>

    <div class="footer-decor"></div>
</body>
</html>
